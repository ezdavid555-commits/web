<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sorteo Crossmotos Boutique</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    .container {
      width: 100%;
      max-width: 650px;
      background: #111;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
      border: 1px solid #222;
    }

    .header {
      background: linear-gradient(90deg, #39ff14, #00b140);
      color: #000;
      text-align: center;
      padding: 40px 30px;
    }

    .header h1 {
      font-size: 2.2rem;
      margin-bottom: 10px;
      font-weight: bold;
    }

    .header p {
      font-size: 1rem;
      font-weight: 600;
    }

    .content {
      padding: 35px;
    }

    .premio {
      background: #1a1a1a;
      border: 1px solid #2c2c2c;
      border-left: 4px solid #39ff14;
      padding: 20px;
      border-radius: 12px;
      margin-bottom: 25px;
    }

    .premio h2 {
      color: #39ff14;
      margin-bottom: 10px;
      font-size: 1.3rem;
    }

    .premio p {
      color: #ddd;
      line-height: 1.6;
    }

    form {
      display: grid;
      gap: 18px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
    }

    label {
      margin-bottom: 6px;
      font-weight: bold;
      color: #ccc;
    }

    input,
    select,
    textarea {
      width: 100%;
      padding: 14px;
      border: 1px solid #333;
      border-radius: 10px;
      background: #1c1c1c;
      color: #fff;
      font-size: 1rem;
      outline: none;
      transition: 0.3s;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: #39ff14;
      box-shadow: 0 0 0 3px rgba(57, 255, 20, 0.15);
    }

    .checkbox {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.95rem;
      color: #ccc;
    }

    .checkbox input {
      width: auto;
      margin-top: 4px;
    }

    .btn {
      background: linear-gradient(90deg, #39ff14, #00b140);
      color: #000;
      border: none;
      padding: 16px;
      border-radius: 10px;
      font-size: 1.1rem;
      font-weight: bold;
      cursor: pointer;
      transition: 0.3s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(57, 255, 20, 0.25);
    }

    .footer {
      text-align: center;
      padding: 20px;
      font-size: 0.9rem;
      color: #999;
      border-top: 1px solid #222;
    }

    .footer a {
      color: #39ff14;
      text-decoration: none;
    }

    @media (max-width: 600px) {
      .header h1 {
        font-size: 1.8rem;
      }

      .content {
        padding: 25px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🏍️ Sorteo Crossmotos Boutique</h1>
      <p>Participa y gana un espectacular accesorio para tu moto</p>
    </div>

    <div class="content">
      <div class="premio">
        <h2>🎁 Premio</h2>
        <p>
          Regístrate y participa por unas exploradoras, guantes o un bono de compra.
          El ganador será anunciado en nuestras redes sociales.
        </p>
      </div>

      <!--
        Cambia la URL del atributo action por la de tu servicio de formularios.
        Opciones gratuitas:
        - https://formsubmit.co/
        - https://formspree.io/
      -->
      <form action="https://formsubmit.co/tu-correo@gmail.com" method="POST">
        <!-- Configuración de FormSubmit -->
        <input type="hidden" name="_subject" value="Nuevo participante del sorteo Crossmotos">
        <input type="hidden" name="_captcha" value="false">
        <input type="hidden" name="_template" value="table">

        <div class="form-group">
          <label for="nombre">Nombre completo</label>
          <input type="text" id="nombre" name="Nombre" required>
        </div>

        <div class="form-group">
          <label for="telefono">Número de WhatsApp</label>
          <input type="tel" id="telefono" name="WhatsApp" required>
        </div>

        <div class="form-group">
          <label for="correo">Correo electrónico</label>
          <input type="email" id="correo" name="Correo" required>
        </div>

        <div class="form-group">
          <label for="ciudad">Ciudad</label>
          <input type="text" id="ciudad" name="Ciudad" required>
        </div>

        <div class="form-group">
          <label for="moto">¿Qué moto tienes?</label>
          <input type="text" id="moto" name="Moto">
        </div>

        <div class="form-group">
          <label for="producto">Producto que más te interesa</label>
          <select id="producto" name="Producto de interés" required>
            <option value="">Selecciona una opción</option>
            <option>Casco</option>
            <option>Guantes</option>
            <option>Exploradoras</option>
            <option>Intercomunicador</option>
            <option>Chaqueta</option>
            <option>Otro</option>
          </select>
        </div>

        <div class="checkbox">
          <input type="checkbox" id="terminos" required>
          <label for="terminos">
            Acepto recibir información y promociones de Crossmotos Boutique.
          </label>
        </div>

        <button type="submit" class="btn">🚀 Participar en el Sorteo</button>
      </form>
    </div>

    <div class="footer">
      © 2026 Crossmotos Boutique · Síguenos en
      <a href="https://www.instagram.com/" target="_blank">Instagram</a>
    </div>
  </div>
</body>
</html>
